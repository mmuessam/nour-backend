[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.tokenizer", "php84Extensions.openssl", "php84Extensions.bcmath", "php84Extensions.ctype", "php84Extensions.fileinfo", "composer_2"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = [
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan config:clear && php artisan migrate --force && php artisan db:seed --force --class=DatabaseSeeder 2>/dev/null || true && php artisan serve --host=0.0.0.0 --port=$PORT"
